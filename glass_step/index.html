<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SQUID GAME - Nhảy Kính</title>
    <link rel="icon" type="image/png" href="../denxanhdendo/res/anh/logo.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="hop_thoai_thong_bao" class="lop_phu_modal" style="display: none;">
        <div class="khung_modal">
            <h3 id="tieu_de_thong_bao">Thông báo</h3>
            <p id="noi_dung_thong_bao"></p>
            <button id="nut_dong_thong_bao">XÁC NHẬN</button>
        </div>
    </div>

    <!-- Modals cho Gợi ý -->
    <div id="modal_xac_nhan_goi_y" class="lop_phu_modal" style="display: none;">
        <div class="khung_modal">
            <h3>Gợi ý Màn 2</h3>
            <p>Trả 40 điểm để có gợi ý?</p>
            <button id="nut_co_goi_y" style="background: #00ff00; color: black;">Có</button>
            <button id="nut_khong_goi_y">Không</button>
        </div>
    </div>

    <div id="modal_cau_hoi_goi_y" class="lop_phu_modal" style="display: none;">
        <div class="khung_modal" style="min-width: 500px;">
            <h3 id="tieu_de_cau_hoi">Câu hỏi 1/10</h3>
            <div id="thoi_gian_tra_loi" style="color: yellow; font-size: 20px; font-weight: bold; margin-bottom: 10px;">Thời gian: 30s</div>
            <p id="noi_dung_cau_hoi" style="font-size: 18px; margin: 20px 0;"></p>
            <div id="vung_dap_an" style="display: flex; justify-content: center; gap: 15px;">
                <!-- Nút đáp án sẽ được tạo bằng JS -->
            </div>
        </div>
    </div>

    <div id="modal_ket_qua_goi_y" class="lop_phu_modal" style="display: none;">
        <div class="khung_modal">
            <h3>Kết quả Gợi ý</h3>
            <p id="chuoi_ket_qua_goi_y" style="font-size: 24px; font-weight: bold; letter-spacing: 2px; color: #00ff00;"></p>
            <p style="font-size: 14px; color: #ccc;">(1: Kính trên an toàn, 0: Kính dưới an toàn, ?: Trả lời sai)</p>
            <button id="nut_dong_ket_qua">ĐÃ HIỂU</button>
        </div>
    </div>

    <div id="ui_thoat">
        <button id="nut_thoat">THOÁT PHÒNG</button>
    </div>
    
    <div id="ui_kinh">
        <div id="luot_cua_ai">Đang chờ...</div>
        <div class="nut_dieu_khien">
            <button id="nut_len"><img src="../denxanhdendo/res/anh/muiten.png" style="transform: scaleY(-1); width: 60px;"></button>
            <button id="nut_xuong"><img src="../denxanhdendo/res/anh/muiten.png" style="width: 60px;"></button>
        </div>
    </div>

    <div id="man_hinh_xep_hang" class="khung_giao_dien" style="display: none;">
        <h2>BẢNG XẾP HẠNG</h2>
        <ul id="danh_sach_xep_hang"></ul>
        <button id="nut_ve_sanh">VỀ SẢNH</button>
    </div>

    <div id="vung_chua_game">
        <canvas id="man_hinh_game" width="1280" height="720"></canvas>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SQUID GAME - Kéo Co</title>
    <link rel="icon" type="image/png" href="../denxanhdendo/res/anh/logo.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="ui_thoat">
    <button id="nut_thoat">THOÁT PHÒNG</button>
</div>

<!-- UI SPAM BẤM PHÍM NẰM DƯỚI CÙNG -->
<div id="ui_keoco">
    <div id="luot_cua_ai">CHUẨN BỊ...</div>
    <div class="nut_dieu_khien">
        <button id="nut_spam">NHẤP LIÊN TỤC <br> HOẶC NHẤN [SPACE]</button>
    </div>
</div>

<!-- MÀN HÌNH XẾP HẠNG CUỐI GAME -->
<div id="man_hinh_xep_hang" class="khung_giao_dien" style="display: none;">
    <h2>BẢNG XẾP HẠNG</h2>
    <h3 id="tieu_de_thang_thua">ĐỘI NÀO ĐÓ ĐÃ THẮNG</h3>
    <ul id="danh_sach_xep_hang"></ul>
    <button id="nut_ve_sanh">VỀ SẢNH</button>
</div>

<div id="vung_chua_game">
    <canvas id="man_hinh_game" width="1280" height="720"></canvas>
</div>

<script type="module" src="script.js"></script>
</body>
</html>
